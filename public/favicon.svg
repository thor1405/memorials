<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Subtle dark luxury background to ensure the golden GFS text pops crisply on both dark and light browser tab bars -->
  <rect width="120" height="120" rx="26" fill="#090a0f" />
  <rect width="112" height="112" x="4" y="4" rx="22" fill="none" stroke="#ac8826" stroke-width="2.5" stroke-opacity="0.5" />
  <!-- Professional architectural luxury serif GFS monogram -->
  <text x="60" y="78" font-family="'Cinzel', 'Times New Roman', serif" font-size="52" font-weight="700" fill="#ac8826" text-anchor="middle" letter-spacing="2">GFS</text>
</svg>
